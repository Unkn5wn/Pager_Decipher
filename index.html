<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pager Cipher Decoder (Hybrid: Keep Letters)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #f5fafd; font-family: "Segoe UI", Arial, sans-serif; color:#253366;}
    .container {
      max-width: 800px; margin: 2.7em auto 0 auto; background: #fff;
      border-radius: 15px; box-shadow: 0 3px 14px 0 rgba(50,60,130,.075);
      padding: 2em 2.2em 2em 2.2em; border:1px solid #deebf5;
    }
    h1 { text-align: center; color: #244780; letter-spacing:.02em; font-size:2.1em;margin:.2em 0 1.1em 0;}
    .instructions { color: #2d6040; background:#f3ffed; border-left:5px solid #2fc27b; padding:.95em 1.2em .5em 1.4em; border-radius:9px; margin-bottom:1em;}
    textarea {
      width:100%; max-width:100%; min-height:120px; font-size:1.18em; box-sizing:border-box;
      border-radius:8px; border:2px solid #b8d4fc; background:#f6f9ff; padding:.83em 1em; margin-top:.5em;
      color:#223355; font-family:'Segoe UI', Arial, sans-serif;
    }
    textarea:focus { border:2px solid #67a0e4; outline:none; background:#fbfdff; }
    button {
      background: #1bb27b; color: #fff; border: none; font-size:1.1em; font-weight:bold;
      border-radius: 7px; padding:.7em 2.3em; margin: 1em .7em 1.1em 0; cursor:pointer;
      box-shadow:0 2px 7px 0 rgba(60,150,100,0.09); letter-spacing:.02em;
      transition:background .13s,box-shadow .15s;
    }
    button:hover { background:#21d894; }
    #output {
      padding:1.15em 1.1em 1.2em 1.1em; background:#fafdfe; border-radius:11px;
      min-height:2.4em; font-size:1.13em; margin-top:.5em; color:#22324a;
      box-shadow:0 2px 7px 0 rgba(60,60,110,0.06); line-height:2.0; max-height: 480px; overflow:auto;
    }
    .batch-table { width:100%; border-collapse:collapse; margin-bottom:1.2em;}
    .batch-table th, .batch-table td { padding:.55em .22em; text-align:left; border-bottom:1px solid #e6eef2;}
    .batch-table th { background:#e7f2fa; color:#2a3d69;}
    .batch-table td input {width: 98%; background: #f6f9ff; border:none; font-weight:600;}
    .parse code { background:#eff4fb; color:#2d4a8d; font-size:.99em; padding:.13em .44em; border-radius:5px; font-family:Consolas,monospace; font-weight:700; letter-spacing:.05em;}
    .lettercombo {margin-left:1.18em;display:inline-block;}
    @media (max-width:820px) {
      .container{padding:1em .4em;}
      .batch-table th, .batch-table td {padding:.36em .09em;}
      textarea {font-size:1em;}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Batch Pager Cipher Decoder</h1>
    <div class="instructions">
      Enter up to <b>500 entries</b> (numbers, letters, or mixed; one per line or comma/space separated).<br>
      Any letters will be left unchanged in the output. All numbers are decoded as before.<br>
      Click <b>Download All</b> for the complete result as a text file.
    </div>
    <form onsubmit="decodeBatch(); return false;">
      <textarea id="inbox" placeholder="13460&#10;HELLO123&#10;111ABC"></textarea><br>
      <button type="submit">Decode Batch</button>
      <button type="button" onclick="downloadBatch()" style="background:#226ec4;">Download All</button>
    </form>
    <div id="output"></div>
  </div>
  <script>
    const pagerReverse = {
      "6": ["A","C","G"],
      "8": ["A","B"],
      "0": ["D","O","Q"],
      "3": ["E"],
      "4": ["F","H","Y"],
      "1": ["I"],
      "7": ["J","L","T"],
      "15": ["K"],
      "177": ["M"],
      "17": ["N"],
      "9": ["P"],
      "12": ["R"],
      "5": ["S"],
      "11": ["U","V"],
      "111": ["W"],
      "25": ["X"],
      "2": ["Z"]
    };

    // Split string into runs of digits and runs of letters/other
    function splitAlphaNum(str) {
      // returns array of {type: 'num'|'alpha', val: string}
      let runs = [];
      let current = '';
      let prevType = null;
      for (const c of str) {
        let isNum = /\d/.test(c);
        let t = isNum ? 'num' : 'alpha';
        if (t !== prevType && current !== '') {
          runs.push({type: prevType, val: current});
          current = '';
        }
        current += c;
        prevType = t;
      }
      if (current) runs.push({type: prevType, val: current});
      return runs;
    }

    function groupings(s) {
      const memo = {};
      function helper(str) {
        if(str.length === 0) return [[]];
        if (memo[str]) return memo[str];
        let all = [];
        for(let len=1; len<=3 && len<=str.length; ++len) {
          let head = str.slice(0,len);
          if (pagerReverse[head]) {
            for (const rest of helper(str.slice(len))) {
              all.push([head,...rest]);
            }
          }
        }
        return memo[str] = all;
      }
      return helper(s);
    }

    function cartesian(arrays) {
      if (!arrays.length) return [];
      return arrays.reduce((a,b)=>a.flatMap(d=>b.map(e=>d.concat([e]))), [[]]);
    }

    let lastBatch = '';

    function decodeBatch() {
      let val = document.getElementById('inbox').value;
      if (!val) {
        document.getElementById('output').innerHTML = '<i>Paste entries to decode.</i>';
        lastBatch = '';
        return;
      }
      let lines = val.replace(/[, ]+/g,'\n').split('\n').map(x=>x.trim()).filter(Boolean);
      if (lines.length > 500) lines = lines.slice(0, 500);
      let html = '<table class="batch-table"><tr><th>Input</th><th>Grouping</th><th>Letter Combination(s)</th></tr>';
      let txtRows = [];
      for (let userInput of lines) {
        if (!userInput) continue;
        let parts = splitAlphaNum(userInput);
        // Build all grouping combinations for numeric runs; always keep alpha runs as-is
        function decodePart(part) {
          if (part.type === "alpha") return [{group: [part.val], letters: [part.val]}];
          let parses = groupings(part.val);
          if (!parses.length) return [{group: [part.val], letters: ["?"]}];
          return parses.map(grp => {
            let letterSets = grp.map(p=>pagerReverse[p]||["?"]);
            let combos = cartesian(letterSets);
            return combos.map(arr => ({
              group: [grp.join("-")],
              letters: [arr.join(" ")]
            })).flat();
          }).flat();
        }

        // Start with one empty result, build up each run
        let working = [{group: [], letters:[]}];
        for (const part of parts) {
          let decoded = decodePart(part);
          let next = [];
          for (let w of working)
            for (let d of decoded)
              next.push({
                group: w.group.concat(d.group),
                letters: w.letters.concat(d.letters)
              });
          working = next;
        }

        for (let res of working) {
          html += `<tr><td>${userInput}</td>
            <td><code>${res.group.join(' ')}</code></td>
            <td>${res.letters.join(' ')}</td></tr>`;
          txtRows.push(`${userInput}\t${res.group.join(' ')}\t${res.letters.join(' ')}`);
        }
      }
      html += '</table>';
      document.getElementById('output').innerHTML = html;
      lastBatch = txtRows.join('\n');
    }

    function downloadBatch() {
      if (!lastBatch) {
        alert("Please decode first!");
        return;
      }
      let blob = new Blob([lastBatch], {type: "text/plain"});
      let url = URL.createObjectURL(blob);
      let a = document.createElement('a');
      a.href = url;
      a.download = "pager_batch_codes.txt";
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},150);
    }
  </script>
</body>
</html>
